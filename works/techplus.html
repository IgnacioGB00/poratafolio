        <section id="Overview" class="u-border-top">
            <h2 class="title TitleColor u-border-bottom" id="titleOverview"
                data-en="Overview"
                data-es="Resumen">Overview</h2>
            <p class="text u-border-bottom u-border-right-Desktop" id="textOverview"
                data-en="TechPlus is a UX/UI and front-end web project focused on creating a clean and intuitive platform for discovering and exploring podcast episodes. The project emphasizes clear content structure, visual hierarchy, and responsive design to make audio content easy to browse across all devices. The interface was designed to highlight episodes, topics, and calls-to-action while maintaining a modern and minimal aesthetic. Built using HTML, CSS, and JavaScript, the project reflects a user-centered approach that combines thoughtful UX decisions with efficient front-end development to deliver a smooth and accessible listening experience."
                data-es="TechPlus es un proyecto web de UX/UI y front-end centrado en crear una plataforma limpia e intuitiva para descubrir episodios de podcast. El proyecto enfatiza una estructura de contenido clara y un diseño responsivo para facilitar la navegación en todos los dispositivos. La interfaz fue diseñada para resaltar episodios y temas manteniendo una estética mínima y moderna."></p>
            <picture id="Overview">
                <source id="OverviewCellImg" srcset="../img/OverviewTechPlusImagenCell.jpg" media="(max-width: 949px)" />
                <source id="OverviewDesktopImg" srcset="../img/OverviewTechPlusImagen.jpg" media="(min-width: 950px)" />
                <img src="../img/OverviewTechPlusImagen.jpg" id="imgOverview" alt="image of the wireframer" loading="lazy" width="1200" height="675">
            </picture>
        </section>

        <section id="MyRole" class="u-border-top">
            <h2 class="title TitleColor u-border-bottom">My Role</h2>
            <p class="text colorText" id="roleText"
                data-en="In this project, I was responsible for both the UX/UI design and front-end development, overseeing the process from initial concept to final implementation. I designed the user experience with a strong focus on usability, accessibility, and content clarity, ensuring that users can easily discover podcast episodes and navigate the platform without friction. On the UI side, I defined the visual direction, layout structure, typography, and visual hierarchy to create a clean and modern interface aligned with the project's goals. I also translated the designs into a fully functional front-end using HTML, CSS, and JavaScript, maintaining design consistency across all screen sizes."
                data-es="En este proyecto, fui responsable tanto del diseño UX/UI como del desarrollo front-end. Diseñé la experiencia de usuario con un fuerte enfoque en la usabilidad y la claridad del contenido. En el lado de la UI, definí la dirección visual y la jerarquía para crear una interfaz moderna. También traduje los diseños a un front-end funcional utilizando HTML, CSS y JavaScript."></p>
        </section>

        <section id="Process" class="u-border-top">
            <h2 class="title TitleColor u-border-bottom">Process</h2>
            <h3 class="subTitle TitleColor u-border-bottom" id="Research">Research & Concept</h3>
            <p class="text u-border-bottom" id="textResearch"
                data-en="During the research phase, I analyzed popular podcast websites and platforms to understand how they structure content, highlight episodes, and engage listeners. I focused on usability patterns that make browsing episodes intuitive, such as clear navigation, visual hierarchy, and concise calls-to-action. The concept was defined around creating a clean, modern podcast web experience that showcases audio content, episode information, and key topics in a way that's both easy to explore and visually appealing. The design direction balances simplicity with functionality to ensure users can find and listen to content with minimal friction."
                data-es="Durante la fase de investigación, analicé plataformas de podcast populares para entender cómo estructuran el contenido. Me enfoqué en patrones de usabilidad que hacen que la navegación sea intuitiva. El concepto se definió en torno a una experiencia web moderna que muestra información de episodios de manera visualmente atractiva."></p>

            <p class="text u-border-bottom u-border-left-Desktop" id="textDeveloment"
                data-en="For the development of TechPlus, I built the front-end using HTML, CSS, and JavaScript to create a responsive and dynamic web experience. I translated the UI designs into clean, semantic HTML and modular CSS, ensuring layout consistency and accessibility. JavaScript was used to enhance interactivity and improve user engagement, while keeping performance smooth and lightweight. The result is a fast, responsive site that works seamlessly across desktop, tablet, and mobile devices, reflecting both solid UX/UI design and efficient front-end implementation."
                data-es="Para el desarrollo, construí el front-end utilizando HTML, CSS y JavaScript. Traduje los diseños de UI en HTML semántico y CSS modular, asegurando la consistencia. Se utilizó JavaScript para mejorar la interactividad y el compromiso del usuario, manteniendo el rendimiento ligero."></p>
