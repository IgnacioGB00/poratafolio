        <section id="Overview" class="u-border-top">
            <h2 class="title TitleColor u-border-bottom" id="titleOverview"
                data-en="Overview"
                data-es="Resumen">Overview</h2>
            <p class="text u-border-bottom u-border-right-Desktop" id="textOverview"
                data-en="Temple of Tranquility is a UX/UI-focused web project inspired by LEGO and traditional Japanese architecture. The main goal was to design a calm, immersive digital experience that highlights a fictional modular LEGO set. The interface prioritizes clarity, visual hierarchy, and smooth navigation, allowing users to explore the concept, modular structure, and individual parts in an intuitive way. The design process emphasized consistency, responsive layouts, and performance optimization, ensuring a seamless experience across desktop, tablet, and mobile devices. Soft colors, balanced spacing, and carefully chosen typography were used to reinforce the feeling of tranquility while keeping the content easy to scan and understand. This project reflects my approach to creating visually engaging interfaces that combine storytelling, usability, and thoughtful interaction design."
                data-es="Temple of Tranquility es un proyecto web enfocado en UX/UI inspirado en LEGO y la arquitectura tradicional japonesa. El objetivo principal fue diseñar una experiencia digital tranquila e inmersiva que destaque un set de LEGO modular ficticio. La interfaz prioriza la claridad, la jerarquía visual y una navegación fluida, permitiendo a los usuarios explorar el concepto, la estructura modular y las piezas individuales de manera intuitiva. El proceso de diseño enfatizó la consistencia, los diseños responsivos y la optimización del rendimiento, asegurando una experiencia perfecta en dispositivos de escritorio, tabletas y móviles."></p>
            <picture id="Overview">

        <section id="MyRole" class="u-border-top">
            <h2 class="title TitleColor u-border-bottom">My Role</h2>
            <p class="text colorText" id="roleText"
                data-en="Temple of Tranquility is a UX/UI and Front-End web project inspired by LEGO and traditional Japanese architecture. My role involved designing the user experience and interface, as well as developing the front-end to bring the concept to life. The goal was to create a calm, immersive digital experience that presents a fictional modular LEGO set in a clear and engaging way. I focused on information architecture, visual hierarchy, and responsive design to ensure intuitive navigation across desktop, tablet, and mobile devices. On the front-end side, I implemented clean layouts, optimized performance, and translated the UI designs into functional, accessible components. The project reflects my ability to combine user-centered design principles with front-end development to deliver visually cohesive and usable digital experiences."
                data-es="Mi rol implicó el diseño de la experiencia de usuario y la interfaz, así como el desarrollo front-end para dar vida al concepto. Me enfoqué en la arquitectura de la información, la jerarquía visual y el diseño responsivo para garantizar una navegación intuitiva. En la parte front-end, implementé diseños limpios, optimicé el rendimiento y traduje los diseños de UI en componentes funcionales y accesibles."></p>
        </section>

        <section id="Process" class="u-border-top">

            <h3 class="subTitle TitleColor u-border-bottom" id="Research">Research & Concept</h3>
            <p class="text u-border-bottom" id="textResearch"
                data-en="The research phase focused on analyzing LEGO product pages, modular design systems, and websites inspired by Japanese aesthetics. The goal was to understand how visual storytelling, layout structure, and interaction patterns can enhance exploration and engagement. I also studied principles of calm UI design, including spacing, color harmony, and typography, to support a peaceful and immersive user experience. Based on this research, the concept was defined as a modular LEGO temple presented through a clean, minimal interface. The design balances visual richness with usability, allowing users to explore the project intuitively while maintaining a consistent and tranquil aesthetic across all devices."
                data-es="La fase de investigación se centró en analizar las páginas de productos de LEGO y sistemas de diseño modular. El objetivo era comprender cómo la narrativa visual y los patrones de interacción pueden mejorar la exploración. También estudié principios de diseño de interfaz de usuario 'calmado', incluyendo el espaciado y la armonía del color, para apoyar una experiencia de usuario pacífica e inmersiva."></p>

            <p class="text u-border-bottom u-border-left-Desktop" id="textDeveloment"
                data-en="The development phase focused on building a responsive and performant front-end using HTML, CSS, and JavaScript. The UI designs were translated into clean, semantic markup and modular styles to ensure consistency and scalability. Special attention was given to layout structure, spacing, and responsiveness to maintain the intended user experience across different screen sizes. JavaScript was used to add interactivity and enhance user engagement while keeping the experience smooth and lightweight. Performance optimization and accessibility best practices were applied to deliver a fast, user-friendly interface that accurately reflects the original UX/UI design vision."
                data-es="La fase de desarrollo se centró en la creación de un front-end responsivo y eficiente utilizando HTML, CSS y JavaScript. Los diseños de UI se tradujeron en marcado semántico limpio y estilos modulares para asegurar consistencia y escalabilidad. Se prestó especial atención a la estructura del diseño y la capacidad de respuesta para mantener la experiencia de usuario en diferentes tamaños de pantalla."></p>
